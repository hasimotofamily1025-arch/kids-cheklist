<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>キッズ・チェックリスト</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <style>
    body { font-family: sans-serif; background-color: #eef9f1; padding: 20px; text-align: center; color: #4a3f35; }
    h1 { font-size: 28px; margin-bottom: 20px; }
    .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .child-card { background: white; border: 4px solid #4a3f35; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .child-name { font-size: 24px; font-weight: bold; background: #4a3f35; color: white; padding: 8px; border-radius: 12px; margin-bottom: 10px; }
    .percent { font-size: 22px; font-weight: bold; margin: 10px 0; color: #ff6b81; }
    .task-list { text-align: left; }
    .task-item { display: flex; align-items: center; background: #fcf8f2; margin: 10px 0; padding: 12px; border-radius: 10px; border: 2px solid #4a3f35; cursor: pointer; font-size: 18px; }
    .task-item input { width: 24px; height: 24px; margin-right: 12px; cursor: pointer; }
    .loading { font-size: 20px; font-weight: bold; margin-top: 50px; }
  </style>
</head>
<body>

  <h1>きょうのチェックリスト</h1>
  <div id="loading-view" class="loading">スプレッドシートからデータをよみこみ中...</div>

  <div class="grid-container" id="app-container" style="display: none;">
    <div class="child-card">
      <div class="child-name">花</div>
      <div class="percent" id="per-花">0%</div>
      <div id="tasks-花" class="task-list"></div>
    </div>
    <div class="child-card">
      <div class="child-name">碧</div>
      <div class="percent" id="per-碧">0%</div>
      <div id="tasks-碧" class="task-list"></div>
    </div>
    <div class="child-card">
      <div class="child-name">瑞</div>
      <div class="percent" id="per-瑞">0%</div>
      <div id="tasks-瑞" class="task-list"></div>
    </div>
  </div>

  <script>
    // URLをしっかりとダブルクォーテーションで囲みました
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwTTXf0ilBXmVZfnrU9pW09l7ZgHOFuq43rL87hd5pBVvYtrV11Cv1yj4vPlFfE7sg/exec";

    const children = ['花', '碧', '瑞'];

    window.onload = function() {
      fetchDataFromSpreadsheet();
    };

    function fetchDataFromSpreadsheet() {
      fetch(GAS_URL)
        .then(response => response.json())
        .then(data => {
          document.getElementById('loading-view').style.display = 'none';
          document.getElementById('app-container').style.display = 'grid';
          
          children.forEach(child => {
            const container = document.getElementById('tasks-' + child);
            container.innerHTML = '';
            
            if (data[child]) {
              data[child].forEach(task => {
                const checkedAttr = task.checked ? 'checked' : '';
                container.innerHTML += `
                  <label class="task-item">
                    <input type="checkbox" ${checkedAttr} onchange="toggleTask('${child}', '${task.name}', this.checked)">
                    <span>${task.name}</span>
                  </label>
                `;
              });
            }
            updatePercent(child);
          });
        })
        .catch(err => {
          document.getElementById('loading-view').innerText = 'データのよみこみに失敗しました。URLを確認してください。';
          console.error(err);
        });
    }

    function toggleTask(childName, taskName, isChecked) {
      updatePercent(childName);

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ child: childName, task: taskName, checked: isChecked })
      });
    }

    function updatePercent(childName) {
      const container = document.getElementById('tasks-' + childName);
      const total = container.querySelectorAll('input[type="checkbox"]').length;
      const checked = container.querySelectorAll('input[type="checkbox"]:checked').length;
      const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
      
      document.getElementById('per-' + childName).innerText = percent + "%";
    }
  </script>
</body>
</html>
